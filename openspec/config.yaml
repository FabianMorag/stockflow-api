# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: NestJS 11 + TypeScript 5.7, Prisma ORM, PostgreSQL (Supabase + Docker local)
  Architecture: Module-based NestJS, WebSocket real-time, Cron market engine
  Testing: Jest 30 (unit), Supertest (e2e)
  Style: ESLint 9 flat config, Prettier (singleQuote, trailingComma all)

strict_tdd: true

testing:
  strict_tdd: true
  test_runner:
    command: "pnpm run test"
    framework: jest
  test_layers:
    unit: { available: true, tool: jest }
    integration: { available: false, tool: "—" }
    e2e: { available: true, tool: "jest + supertest" }
  coverage:
    available: true
    command: "pnpm run test:cov"
  quality_tools:
    linter: { available: true, command: "pnpm run lint" }
    type_checker: { available: true, command: "tsc --noEmit" }
    formatter: { available: true, command: "pnpm run format" }

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Load relevant coding skills for the project stack
  verify:
    - Run tests if test infrastructure exists
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)
